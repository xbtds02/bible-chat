<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Chat 管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0f0f23; --card: #1a1a2e; --card2: #232342; --accent: #ffd700; --text: #e8e8e8; --text2: #a0a0b0; --border: #2a2a4a; --danger: #f44336; --success: #4caf50; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; margin: 20px 0; color: var(--accent); font-size: 24px; }
h2 { color: var(--accent); font-size: 18px; margin: 20px 0 12px; }
.login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; max-width: 400px; margin: 60px auto; }
.login-box input { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; }
.login-box button { width: 100%; padding: 14px; background: var(--accent); color: #1a1a2e; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
.login-box button:hover { background: #ffe44d; }
.error { color: var(--danger); text-align: center; margin: 10px 0; font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 16px 0; }
.stat-card { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.stat-card .num { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 13px; color: var(--text2); margin-top: 4px; }
table { width: 100%; border-collapse: collapse; margin: 12px 0; background: var(--card); border-radius: 12px; overflow: hidden; }
th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
th { background: var(--card2); color: var(--accent); font-weight: 600; }
td { color: var(--text2); }
input, textarea, select { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px; width: 100%; outline: none; margin-bottom: 10px; }
textarea { min-height: 120px; resize: vertical; font-size: 13px; }
button { background: var(--accent); color: #1a1a2e; border: none; border-radius: 10px; padding: 12px 20px; font-size: 15px; cursor: pointer; font-weight: bold; }
button.secondary { background: var(--card2); border: 1px solid var(--border); color: var(--text); }
button.danger { background: var(--danger); color: #fff; }
.hidden { display: none; }
.logout { float: right; }
.flex { display: flex; gap: 10px; }
.flex > * { flex: 1; }
label { color: var(--text2); font-size: 13px; display: block; margin-bottom: 4px; }
code { color: var(--accent); background: var(--card2); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.status-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.status-row .key { color: var(--text2); }
.status-row .val { color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <h1>✝ Bible Chat 管理面板</h1>

  <div id="loginView" class="login-box">
    <p style="text-align:center; margin-bottom:15px; color:var(--text2);">请输入管理员密码</p>
    <input type="password" id="adminPwd" placeholder="管理员密码" autofocus>
    <button onclick="doLogin()">登录管理面板</button>
    <p id="loginError" class="error hidden"></p>
  </div>

  <div id="adminView" class="hidden">
    <button class="logout danger" onclick="logout()">退出</button>

    <div class="stats">
      <div class="stat-card"><div class="num" id="statUsers">0</div><div class="label">本机注册用户</div></div>
      <div class="stat-card"><div class="num" id="statChats">0</div><div class="label">本机对话数</div></div>
      <div class="stat-card"><div class="num" id="statBooks">66</div><div class="label">圣经卷数</div></div>
      <div class="stat-card"><div class="num" id="statVerses">31,106</div><div class="label">总节数</div></div>
    </div>

    <div class="card">
      <h2>🔑 API 配置</h2>
      <label>API 地址</label>
      <input id="cfgApiBase" value="https://www.apicz.cc/v1/chat/completions" placeholder="API endpoint URL">
      <label>API Key</label>
      <input id="cfgApiKey" type="password" placeholder="sk-..." value="">
      <label>默认模型</label>
      <select id="cfgModel">
        <option value="gpt-5.4-mini">GPT-5.4-mini（推荐，快速省额）</option>
        <option value="gpt-5.5">GPT-5.5（最智能）</option>
      </select>
      <div class="flex">
        <button onclick="saveApiConfig()">保存配置</button>
        <button class="secondary" onclick="testApi()">测试连接</button>
      </div>
      <p id="apiStatus" style="color:var(--text2);font-size:13px;margin-top:8px"></p>
    </div>

    <div class="card">
      <h2>📝 系统提示词</h2>
      <textarea id="cfgSystemPrompt" placeholder="自定义 AI 系统提示词，留空使用默认">你是 Bible Chat (biblechat.cc) 的 AI 信仰助手，基于 GPT。请以温柔、智慧、基于圣经的方式回答。</textarea>
      <button onclick="saveSystemPrompt()">保存提示词</button>
    </div>

    <div class="card">
      <h2>📊 系统状态</h2>
      <div id="statusInfo"></div>
    </div>

    <div class="card">
      <h2>👥 本机用户数据</h2>
      <table>
        <thead><tr><th>姓名</th><th>邮箱</th><th>信仰阶段</th><th>是否基督徒</th><th>注册时间</th></tr></thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>📡 部署信息</h2>
      <div class="status-row"><span class="key">网站</span><span class="val"><a href="https://biblechat.cc" style="color:var(--accent)">https://biblechat.cc</a></span></div>
      <div class="status-row"><span class="key">管理面板</span><span class="val"><a href="https://biblechat.cc/admin.html" style="color:var(--accent)">https://biblechat.cc/admin.html</a></span></div>
      <div class="status-row"><span class="key">部署方式</span><span class="val">GitHub Pages</span></div>
      <div class="status-row"><span class="key">AI 后端</span><span class="val">GPT via apicz.cc</span></div>
    </div>
  </div>
</div>

<script>
const ADMIN_PWD = 'biblechat2026';

function doLogin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PWD) {
    localStorage.setItem('bc_admin_auth', pwd);
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    loadAdminData();
  } else {
    const el = document.getElementById('loginError');
    el.textContent = '密码错误';
    el.classList.remove('hidden');
  }
}

function logout() {
  localStorage.removeItem('bc_admin_auth');
  location.reload();
}

function loadAdminData() {
  // 从 localStorage 读取配置
  const apiKey = localStorage.getItem('bc_api_key') || '';
  const model = localStorage.getItem('bc_model') || 'gpt-5.4-mini';

  document.getElementById('cfgApiKey').value = apiKey;
  document.getElementById('cfgModel').value = model;

  // 用户数据
  const user = JSON.parse(localStorage.getItem('bc_user') || 'null');
  const chats = JSON.parse(localStorage.getItem('bc_chat') || '[]');
  const totalChats = chats.filter(m => m.role === 'user').length;

  document.getElementById('statUsers').textContent = user ? 1 : 0;
  document.getElementById('statChats').textContent = totalChats;

  // 用户表
  const tbody = document.getElementById('userTable');
  if (!user) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text2)">暂无注册用户</td></tr>';
  } else {
    tbody.innerHTML = `<tr>
      <td>${user.name}</td>
      <td>${user.email}</td>
      <td>${user.questionnaire?.faith_stage || '-'}</td>
      <td>${user.questionnaire?.is_christian || '-'}</td>
      <td>${new Date(user.registeredAt).toLocaleString('zh-CN')}</td>
    </tr>`;
  }

  // 系统状态
  const statusInfo = document.getElementById('statusInfo');
  statusInfo.innerHTML = `
    <div class="status-row"><span class="key">API 地址</span><span class="val"><code>${document.getElementById('cfgApiBase').value}</code></span></div>
    <div class="status-row"><span class="key">当前模型</span><span class="val">${model}</span></div>
    <div class="status-row"><span class="key">Key 预览</span><span class="val">${apiKey.slice(0,8)}...${apiKey.slice(-6)}</span></div>
    <div class="status-row"><span class="key">应用版本</span><span class="val">v4.0</span></div>
    <div class="status-row"><span class="key">本地时间</span><span class="val">${new Date().toLocaleString('zh-CN')}</span></div>
  `;
}

function saveApiConfig() {
  const key = document.getElementById('cfgApiKey').value.trim();
  const model = document.getElementById('cfgModel').value;
  if (key) localStorage.setItem('bc_api_key', key);
  localStorage.setItem('bc_model', model);
  document.getElementById('apiStatus').textContent = '✓ 配置已保存';
  document.getElementById('apiStatus').style.color = 'var(--success)';
  loadAdminData();
}

async function testApi() {
  const key = document.getElementById('cfgApiKey').value.trim();
  const model = document.getElementById('cfgModel').value;
  const base = document.getElementById('cfgApiBase').value;
  if (!key) { document.getElementById('apiStatus').textContent = '请输入 API Key'; document.getElementById('apiStatus').style.color = 'var(--danger)'; return; }

  document.getElementById('apiStatus').textContent = '测试中...';
  document.getElementById('apiStatus').style.color = 'var(--text2)';

  try {
    const res = await fetch(base, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model: model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 10 }),
    });
    if (res.ok) {
      const data = await res.json();
      document.getElementById('apiStatus').textContent = `✓ 连接成功 (${data.model || model})`;
      document.getElementById('apiStatus').style.color = 'var(--success)';
    } else {
      const txt = await res.text().catch(() => '');
      document.getElementById('apiStatus').textContent = `✗ 错误 ${res.status}: ${txt.slice(0,100)}`;
      document.getElementById('apiStatus').style.color = 'var(--danger)';
    }
  } catch (e) {
    document.getElementById('apiStatus').textContent = `✗ 网络错误: ${e.message}`;
    document.getElementById('apiStatus').style.color = 'var(--danger)';
  }
}

function saveSystemPrompt() {
  const text = document.getElementById('cfgSystemPrompt').value.trim();
  if (text) { localStorage.setItem('bc_system_prompt', text); }
  else { localStorage.removeItem('bc_system_prompt'); }
  showToast('系统提示词已保存');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#232342;border:1px solid #ffd700;border-radius:10px;padding:12px 20px;color:#e8e8e8;font-size:14px;z-index:9999;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// 自动登录
window.addEventListener('load', () => {
  const saved = localStorage.getItem('bc_admin_auth');
  if (saved === ADMIN_PWD) {
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('loginView').classList.add('hidden');
    loadAdminData();
  }
  // 密码框回车
  document.getElementById('adminPwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
</body>
</html>
