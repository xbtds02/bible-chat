<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Bible Chat - AI智慧信仰助手</title>
<meta name="description" content="Bible Chat - AI驱动的圣经阅读与信仰交流，每日金句、祷告、讲章生成、灵修成长">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x271D;</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f23;--card:#1a1a2e;--card2:#232342;--accent:#ffd700;--accent2:#c9a227;--text:#e8e8e8;--text2:#a0a0b0;--success:#4caf50;--danger:#f44336;--border:#2a2a4a}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.page{flex:1;display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}
.page-header{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-header h2{font-size:18px;color:var(--accent)}
.page-content{flex:1;overflow-y:auto;padding:16px}
.bottom-nav{flex-shrink:0;display:flex;justify-content:space-around;background:var(--card);border-top:1px solid var(--border);padding:6px 0}
.bottom-nav button{flex:1;background:none;border:none;color:var(--text2);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .2s}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button span{font-size:20px}

/* ======== 聊天页 ======== */
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.tool-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tool-btn:hover{background:var(--accent);color:#1a1a2e}
.tool-btn.active{background:var(--accent);color:#1a1a2e}
.toolbar-right{margin-left:auto;display:flex;gap:6px}
.mode-btn{font-weight:bold}

.chat-welcome{text-align:center;padding:40px 20px;color:var(--text2)}
.chat-welcome .welcome-cross{font-size:48px;color:var(--accent);margin-bottom:16px}
.chat-welcome h2{color:var(--accent);font-size:22px;margin-bottom:8px}
.chat-welcome p{font-size:15px;margin-bottom:24px}
.suggested-questions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:500px;margin:0 auto}
.suggestion-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.suggestion-chip:hover{background:var(--accent);color:#1a1a2e;border-color:var(--accent)}

.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.message{max-width:85%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.6;word-break:break-word}
.message.user{align-self:flex-end;background:var(--accent);color:#1a1a2e}
.message.ai{align-self:flex-start;background:var(--card2);color:var(--text)}
.message .model-tag{font-size:11px;color:var(--accent2);margin-bottom:4px;opacity:.7}
.msg-content{white-space:pre-wrap}

/* 消息操作栏 */
.msg-actions{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;align-items:center}
.msg-action-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.msg-action-btn:hover,.msg-action-btn.active{background:var(--accent);color:#1a1a2e;border-color:var(--accent)}
.feedback-tag{font-size:14px;margin-left:4px}

/* 聊天输入区 */
.chat-input-area{padding:8px 12px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:15px;resize:none;min-height:44px;max-height:120px;outline:none}
.chat-input-area button{background:var(--accent);border:none;border-radius:12px;padding:10px 18px;color:#1a1a2e;font-weight:bold;cursor:pointer;font-size:14px;white-space:nowrap}
.chat-input-area button:disabled{opacity:.5}
.voice-btn{background:var(--card2)!important;border:1px solid var(--border)!important;color:var(--text)!important;border-radius:50%!important;width:44px!important;height:44px!important;padding:0!important;display:flex!important;align-items:center!important;justify-content:center!important;font-size:18px!important}
.voice-btn.recording{background:var(--danger)!important;color:#fff!important;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ======== 会话列表 ======== */
.session-list-modal{max-width:500px!important;width:100%!important}
.session-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.session-list-body{max-height:60vh;overflow-y:auto}
.session-item{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.session-item:hover{border-color:var(--accent)}
.session-item.active{border-color:var(--accent);background:var(--card2)}
.session-info{flex:1;min-width:0}
.session-title{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-time{font-size:12px;color:var(--text2);margin-top:2px}
.session-del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 8px;opacity:.5}
.session-del:hover{opacity:1}

/* ======== 圣经阅读器 ======== */
.bible-nav{display:flex;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.bible-nav button{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:14px;cursor:pointer;white-space:nowrap}
.bible-nav button.active{background:var(--accent);color:#1a1a2e}
.book-list{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px}
.book-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;color:var(--text);font-size:13px;transition:all .2s;display:flex;flex-direction:column;gap:3px;align-items:center}
.book-btn:hover,.book-btn:active{background:var(--accent);color:#1a1a2e}
.book-btn .abbr{color:var(--accent);font-size:11px;font-weight:bold}
.book-btn .zh-name{font-weight:500}
.book-btn .chinfo{color:var(--text2);font-size:10px}
.book-btn:hover .abbr,.book-btn:hover .chinfo{color:#1a1a2e}
.chapter-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:8px}
.chapter-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 4px;text-align:center;cursor:pointer;color:var(--text);font-size:14px;font-weight:500}
.chapter-btn:hover,.chapter-btn:active{background:var(--accent);color:#1a1a2e}
.verse-content{padding:12px;line-height:2;font-size:16px}
.verse-content .lang-toggle{text-align:center;margin-bottom:12px;padding:8px;background:var(--card2);border-radius:8px}
.verse-content .lang-toggle button{background:transparent;border:1px solid var(--border);border-radius:16px;padding:4px 14px;color:var(--text2);font-size:13px;cursor:pointer;margin:0 4px}
.verse-content .lang-toggle button.active{background:var(--accent);color:#1a1a2e;border-color:var(--accent)}
.verse-line{padding:10px 0;border-bottom:1px solid var(--border);line-height:1.8}
.verse-line:last-child{border-bottom:none}
.verse-line .ref{color:var(--accent);font-size:13px;margin-right:10px;font-weight:bold;display:inline-block;min-width:24px}
.verse-line .zh{color:var(--text);font-size:16px;margin-top:4px}
.verse-line .en{color:var(--text2);font-size:14px;margin-top:4px;font-style:italic;line-height:1.6}
.verse-actions{display:flex;gap:8px;padding:12px;justify-content:center;flex-wrap:wrap}
.verse-actions button{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;cursor:pointer}
.verse-actions button:hover{background:var(--accent);color:#1a1a2e}

/* ======== 每日金句 ======== */
.daily-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
.daily-card .date{color:var(--accent);font-size:14px;margin-bottom:8px}
.daily-card .ref{color:var(--accent2);font-size:13px;margin-bottom:12px}
.daily-card .verse-zh{font-size:20px;line-height:1.8;color:var(--text);margin-bottom:8px;font-weight:500}
.daily-card .verse-en{font-size:15px;color:var(--text2);font-style:italic}
.share-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.share-card textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;resize:vertical;min-height:80px;outline:none;margin-bottom:12px}
.share-card .preview{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:12px;text-align:center}
.share-card .preview h4{color:var(--accent);margin-bottom:8px}
.share-card .preview p{margin:4px 0}
.share-card .preview .link{color:var(--accent2);font-size:12px;margin-top:8px}
.share-actions{display:flex;gap:8px;flex-wrap:wrap}
.share-actions button{flex:1;min-width:120px;background:var(--accent);border:none;border-radius:10px;padding:10px;color:#1a1a2e;font-weight:bold;cursor:pointer;font-size:14px}
.share-actions button.secondary{background:var(--card2);border:1px solid var(--border);color:var(--text)}

/* ======== 灵修工具 ======== */
.devotional-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.devotional-tabs button{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.devotional-tabs button.active{background:var(--accent);color:#1a1a2e;border-color:var(--accent)}
.tool-result-content{background:var(--bg);border-radius:10px;padding:14px;margin-top:8px}
.tool-result-text{font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--text);margin-bottom:12px}
.tool-result-actions{display:flex;gap:8px}

/* ======== 祷告 ======== */
.prayer-list{display:flex;flex-direction:column;gap:8px}
.prayer-item{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
.prayer-item:hover{background:var(--card)}
.prayer-item h4{color:var(--accent);font-size:15px;margin-bottom:4px}
.prayer-item p{color:var(--text2);font-size:13px}
.prayer-detail{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:8px;line-height:1.8;font-size:15px;white-space:pre-wrap}
.prayer-detail .prayer-title{color:var(--accent);font-size:18px;margin-bottom:12px;text-align:center}

/* ======== 收藏 ======== */
.favorites-list{display:flex;flex-direction:column;gap:8px}
.favorite-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s}
.favorite-item:hover{border-color:var(--accent)}
.fav-q{font-size:12px;color:var(--text2);margin-bottom:4px}
.fav-a{font-size:13px;color:var(--text)}

/* ======== 通用卡片 ======== */
.statement-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;line-height:1.8;font-size:15px}
.statement-card h3{color:var(--accent);margin-bottom:10px;font-size:18px}
.statement-card p{margin-bottom:8px}
.loading{text-align:center;padding:20px;color:var(--text2)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ======== 欢迎页 ======== */
.welcome-page{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 20px;text-align:center;overflow-y:auto}
.welcome-hero{margin-bottom:30px}
.cross-icon{font-size:64px;color:var(--accent);margin-bottom:16px;display:block}
.welcome-hero h1{font-size:32px;color:var(--accent);margin-bottom:8px}
.welcome-hero .subtitle{font-size:16px;color:var(--text2);margin-bottom:16px}
.feature-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.feature-tags span{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--text)}
.welcome-features{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.feature-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:left}
.feature-card .feature-icon{font-size:28px;display:block;margin-bottom:8px}
.feature-card h3{color:var(--accent);font-size:16px;margin-bottom:4px}
.feature-card p{color:var(--text2);font-size:13px;line-height:1.6}
.welcome-actions{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto}
.primary-btn{background:var(--accent);border:none;border-radius:12px;padding:14px;color:#1a1a2e;font-weight:bold;font-size:16px;cursor:pointer;width:100%}
.secondary-btn{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:16px;cursor:pointer;width:100%}
.register-form{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
.register-form input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:15px;margin-bottom:10px;outline:none}

/* ======== 问卷/弹窗 ======== */
.questionnaire,.q-modal-content{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px}
.q-item{margin-bottom:16px}
.q-title{color:var(--text);font-size:15px;margin-bottom:8px;font-weight:500}
.q-options{display:flex;flex-direction:column;gap:6px}
.q-opt{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--text)}
.q-opt:hover{border-color:var(--accent)}
.q-opt input[type="radio"]{accent-color:var(--accent)}
.q-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px}
.q-modal-content{max-width:400px;width:100%;max-height:80vh;overflow-y:auto}

/* ======== 管理面板 ======== */
.admin-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column}
.admin-panel.active{display:flex}
.admin-header{padding:16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.admin-header h2{color:var(--accent)}
.admin-header button{background:var(--danger);border:none;border-radius:8px;padding:8px 16px;color:#fff;cursor:pointer}
.admin-content{flex:1;overflow-y:auto;padding:16px}
.admin-content .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.admin-content .stat-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.admin-content .stat-card .number{color:var(--accent);font-size:28px;font-weight:bold}
.admin-content .stat-card .label{color:var(--text2);font-size:13px;margin-top:4px}
.admin-content table{width:100%;border-collapse:collapse;font-size:13px}
.admin-content th,.admin-content td{padding:10px;border-bottom:1px solid var(--border);text-align:left}
.admin-content th{color:var(--accent);font-size:13px}
.admin-content td{color:var(--text2)}

.back-btn{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:4px 8px;display:flex;align-items:center;gap:4px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card2);border:1px solid var(--accent);border-radius:10px;padding:12px 20px;color:var(--text);font-size:14px;opacity:0;transition:all .3s;z-index:2000;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}
</style>
</head>
<body>
<div id="app">
  <div class="bottom-nav" id="bottomNav">
    <button data-page="chat" class="active"><span>💬</span>AI对话</button>
    <button data-page="bible"><span>📖</span>圣经</button>
    <button data-page="daily"><span>✨</span>每日金句</button>
    <button data-page="prayer"><span>🌱</span>灵修</button>
    <button data-page="more"><span>⚙️</span>更多</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
