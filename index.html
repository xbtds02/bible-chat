<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>圣经小助手 - 你的专属圣经伙伴</title>
<meta name="description" content="免费中文圣经阅读、语音朗读、每日金句、AI圣经问答、祷告灵修">
<meta name="keywords" content="圣经,中文圣经,圣经阅读,每日经文,祷告,灵修,AI圣经">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252545;--surface3:#2a2a4a;--gold:#d4a574;--gold2:#c9964d;--accent:#8b5cf6;--accent2:#a78bfa;--text:#e8e0d0;--text2:#a09080;--text3:#7a6a5a;--danger:#ef4444;--success:#22c55e;--radius:12px;--radius-sm:8px;--radius-lg:16px;--shadow:0 4px 24px rgba(0,0,0,.3)}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%, rgba(139,92,246,.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(212,165,116,.04) 0%, transparent 50%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:100%;margin:0 auto}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 16px;height:56px}
.nav-logo{font-size:20px;font-weight:700;color:var(--gold);margin-right:auto;display:flex;align-items:center;gap:8px}
.nav-logo span{font-size:14px;color:var(--text2);font-weight:400}
.nav-actions{display:flex;gap:4px}
.nav-btn{width:36px;height:36px;border:none;border-radius:50%;background:transparent;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,26,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;color:var(--text3);font-size:10px;cursor:pointer;padding:4px;transition:all .2s;min-width:0}
.tab-item .tb-icon{font-size:22px;transition:all .2s}
.tab-item.active{color:var(--gold)}
.tab-item.active .tb-icon{transform:translateY(-2px)}

/* CONTENT */
.content{padding:16px 16px 100px;max-width:800px;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HEADERS */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-header h2{font-size:22px;color:var(--text);font-weight:700}
.section-header .sh-icon{font-size:26px}
.stats-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-badge{background:var(--surface);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);border:1px solid rgba(255,255,255,.06)}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius-lg);padding:20px;border:1px solid rgba(255,255,255,.04);transition:all .3s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.card-header .card-icon{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(139,92,246,.15)}
.card h3{font-size:16px;color:var(--text);line-height:1.4}
.card .card-ref{font-size:11px;color:var(--text3);margin-top:4px}
.card .card-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-top:8px}
.card .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--radius);border:none;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1a1a}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,165,116,.3)}
.btn-outline{border:1.5px solid rgba(255,255,255,.15);background:transparent;color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:50%}

/* FORMS */
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:12px 16px;background:var(--surface2);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:inherit;transition:all .2s}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.2)}
.input-group textarea{resize:vertical;min-height:80px}

/* VERSE CARD */
.verse-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border-radius:var(--radius-lg);padding:32px 24px;border:1px solid rgba(212,165,116,.15);position:relative;overflow:hidden;margin-bottom:20px}
.verse-card::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(212,165,116,.08) 0%,transparent 70%);border-radius:50%}
.verse-card .vc-date{font-size:12px;color:var(--gold);margin-bottom:12px;font-weight:600;letter-spacing:1px}
.verse-card .vc-text{font-size:20px;line-height:1.8;color:var(--text);position:relative;z-index:1;margin-bottom:16px}
.verse-card .vc-ref{font-size:13px;color:var(--text2);font-weight:600}
.verse-card .vc-theme{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(212,165,116,.1);color:var(--gold);font-size:11px;margin-bottom:12px}
.verse-card .vc-actions{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1}

/* BIBLE READER */
.bible-nav{display:flex;gap:8px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.bible-nav select{padding:10px 14px;background:var(--surface2);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:inherit;min-width:120px}
.bible-nav select:focus{outline:none;border-color:var(--accent)}
.bible-text{background:var(--surface);border-radius:var(--radius-lg);padding:24px;border:1px solid rgba(255,255,255,.04)}
.bible-text h3{margin-bottom:16px;font-size:18px;color:var(--gold)}
.bible-text .verse{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:15px;line-height:1.7;transition:all .2s}
.bible-text .verse:hover{background:rgba(255,255,255,.02);border-radius:6px}
.bible-text .verse-num{color:var(--gold);font-size:11px;font-weight:700;min-width:24px;padding-top:2px}
.bible-text .verse-text{flex:1;color:var(--text)}
.tts-bar{display:flex;align-items:center;gap:12px;margin:16px 0;padding:12px 16px;background:var(--surface2);border-radius:var(--radius);flex-wrap:wrap}
.tts-bar .speed-btn{padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s}
.tts-bar .speed-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tts-status{font-size:12px;color:var(--text3);margin-left:auto}

/* CHAT */
.chat-container{background:var(--surface);border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;height:calc(100vh - 300px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-msg{max-width:85%;padding:14px 18px;border-radius:var(--radius-lg);font-size:14px;line-height:1.7;word-break:break-word;animation:fadeIn .2s}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:4px}
.chat-msg.loading{display:flex;gap:4px;align-items:center;padding:12px 18px}
.chat-msg.loading .dot{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.4s infinite;animation-delay:calc(var(--d)*.2s)}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.chat-input-area{padding:16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;align-items:center}
.chat-input-area textarea{flex:1;padding:12px 16px;background:var(--surface2);border:1.5px solid rgba(255,255,255,.08);border-radius:25px;color:var(--text);font-size:14px;font-family:inherit;resize:none;height:44px;max-height:120px;line-height:1.4}
.chat-input-area textarea:focus{outline:none;border-color:var(--accent)}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chat-send:hover{background:var(--accent2)}
.quick-prompts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.quick-prompt{padding:8px 14px;background:var(--surface2);border:1px solid rgba(255,255,255,.06);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-prompt:hover{background:var(--surface3);color:var(--text);transform:translateY(-1px)}

/* PRAYER */
.prayer-cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.prayer-cat{padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
.prayer-cat:hover{background:var(--surface2);color:var(--text)}
.prayer-cat.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.prayer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.prayer-card{background:var(--surface);border-radius:var(--radius-lg);padding:20px;border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .3s}
.prayer-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(139,92,246,.2)}
.prayer-card h4{font-size:15px;color:var(--text);margin-bottom:8px}

/* PODCAST */
.podcast-player{background:linear-gradient(135deg,var(--surface) 0%,#1a1030 100%);border-radius:var(--radius-lg);padding:24px;border:1px solid rgba(139,92,246,.15);margin-bottom:20px}
.podcast-info{text-align:center;margin-bottom:20px}
.podcast-info h3{font-size:20px;color:var(--text)}
.podcast-info p{font-size:13px;color:var(--text2);margin-top:6px}
.podcast-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.podcast-btn{width:48px;height:48px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.podcast-play{width:64px;height:64px;background:var(--accent);color:#fff;font-size:24px}
.podcast-play:hover{background:var(--accent2);transform:scale(1.05)}
.podcast-progress{width:100%;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;cursor:pointer;margin:12px 0}
.podcast-progress-bar{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear}
.podcast-time{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.podcast-transcript{background:var(--surface);border-radius:var(--radius);padding:16px;margin-top:16px;max-height:200px;overflow-y:auto;font-size:14px;color:var(--text2);line-height:1.8}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{padding:32px;border-radius:var(--radius-lg);width:90%;max-width:440px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:20px;margin-bottom:20px}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--surface3);color:var(--text)}

/* GRID */
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:12px 24px;border-radius:25px;font-size:14px;z-index:300;animation:fadeIn .3s}

/* RESPONSIVE */
@media(max-width:600px){
  .nav-logo{font-size:17px}
  .verse-card .vc-text{font-size:17px}
  .prayer-grid{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .card{padding:16px}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* SHARE CARD */
.share-card{background:#fff;color:#333;border-radius:var(--radius-lg);padding:24px;max-width:500px;margin:0 auto;text-align:center;font-family:'SimSun','STSong',serif;position:relative}
.share-card .sc-bible{font-size:18px;line-height:1.8;color:#333;margin-bottom:12px;text-align:left}
.share-card .sc-ref{font-size:14px;color:#888;margin-bottom:16px}
.share-card .sc-brand{font-size:12px;color:#aaa;border-top:1px solid #eee;padding-top:12px}
.share-card-img{width:100%;border-radius:8px;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
<nav class="nav">
  <div class="nav-logo">📖 圣经小助手<span>biblechat.cc</span></div>
  <div class="nav-actions">
    <button class="nav-btn" id="navUser" title="用户">👤</button>
  </div>
</nav>

<div class="content" id="contentArea"></div>

<div class="tab-bar">
  <button class="tab-item active" data-page="home"><span class="tb-icon">🏠</span>首页</button>
  <button class="tab-item" data-page="bible"><span class="tb-icon">📖</span>读经</button>
  <button class="tab-item" data-page="chat"><span class="tb-icon">💬</span>AI问答</button>
  <button class="tab-item" data-page="prayer"><span class="tb-icon">🙏</span>祷告</button>
  <button class="tab-item" data-page="podcast"><span class="tb-icon">🎙️</span>播客</button>
</div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
